rchid, heliotrope, and tangerine over vanilla, musk, and sandalwood."},{"number":240,"name":"Asad Big Stick (Oil)","company":"SAQR","inspiredBy":"Lattafa Asad","category":"Unisex","scentDesc":"Perfume oil stick with a bold spicy-amber profile: black pepper, pineapple, and tobacco over coffee and patchouli, drying down to vanilla, amber, and resinous woods."}];
const IMGS = {};                                    // number -> dataURL (memory)
const norm = s => String(s||'').toLowerCase();
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hi(text, q){
  if(!q) return esc(text);
  const t = String(text||''); const i = norm(t).indexOf(q);
  if(i<0) return esc(t);
  return esc(t.slice(0,i)) + '<mark>' + esc(t.slice(i,i+q.length)) + '</mark>' + esc(t.slice(i+q.length));
}
function render(){
  const q = norm(document.getElementById('q').value).trim();
  const hits = DATA.filter(p =>
    !q ||
    norm(p.name).includes(q) ||
    norm(p.inspiredBy).includes(q) ||
    norm(p.company).includes(q) ||
    String(p.number) === q.replace('#','')
  );
  document.getElementById('count').textContent = hits.length + ' of ' + DATA.length + ' products';
  const grid = document.getElementById('grid');
  if(!hits.length){ grid.innerHTML = '<div class="none">Nothing matches - try fewer letters.</div>'; return; }
  grid.innerHTML = hits.map(p => `
    <div class="card">
      <div class="ph" id="ph-${p.number}">${IMGS[p.number] ? '<img src="'+IMGS[p.number]+'">' : '#'+p.number}</div>
      <div class="in">
        <span class="num">#${p.number}</span>
        <div class="nm">${hi(p.name, q)}</div>
        ${p.inspiredBy ? '<div class="insp">Inspired by '+hi(p.inspiredBy, q)+'</div>' : ''}
        <div class="co">${esc(p.company||'')}${p.category ? ' &middot; '+esc(p.category) : ''}</div>
      </div>
    </div>`).join('');
}
document.getElementById('q').addEventListener('input', render);
render();

/* photos ride the shared cloud table, chunk by chunk in the background */
(function(){
  if(!window.CO_SYNC) return;
  const H = { apikey: CO_SYNC.anonKey, Authorization: 'Bearer '+CO_SYNC.anonKey };
  let cache = {};
  try{ cache = JSON.parse(localStorage.getItem('cat_img_cloud')||'{}'); }catch(_){}
  Object.keys(cache).forEach(n => { if(cache[n] && cache[n].img) IMGS[n] = cache[n].img; });
  if(Object.keys(IMGS).length) render();
  fetch(CO_SYNC.url+'/rest/v1/product_images?select=number,updated_at', {headers:H})
    .then(x=>x.json()).then(idx=>{
      if(!Array.isArray(idx)) return;
      const need = idx.filter(r=>!cache[r.number] || cache[r.number].ts < r.updated_at).map(r=>r.number);
      let chain = Promise.resolve();
      for(let i=0;i<need.length;i+=3){
        const ch = need.slice(i,i+3);
        chain = chain.then(()=>
          fetch(CO_SYNC.url+'/rest/v1/product_images?select=number,image,updated_at&number=in.('+ch.join(',')+')', {headers:H})
            .then(x=>x.json()).then(rows=>{
              if(!Array.isArray(rows)) return;
              rows.forEach(row=>{
                if(!row.image || row.image.length > 400000) return;
                IMGS[row.number] = row.image;
                cache[row.number] = { img: row.image, ts: row.updated_at };
                const ph = document.getElementById('ph-'+row.number);
                if(ph) ph.innerHTML = '<img src="'+row.image+'">';
              });
              try{ localStorage.setItem('cat_img_cloud', JSON.stringify(cache)); }catch(_){ /* quota - memory only */ }
            }).catch(()=>{})
        );
      }
    }).catch(()=>{});
})();
