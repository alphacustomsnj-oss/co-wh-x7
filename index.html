<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>C&amp;O Warehouse</title>
<meta name="theme-color" content="#0a0a0a">
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: #0a0a0a; color: #f2f2f2;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 28px 18px; text-align: center;
  }
  img.logo { width: min(190px, 42vw); height: auto; margin-bottom: 2px; }
  h1 { font-size: clamp(22px, 5vw, 30px); font-weight: 800; letter-spacing: .5px; }
  p.sub { color: #9a9a9e; font-size: 14.5px; margin-bottom: 20px; }
  .apps { display: flex; flex-direction: column; gap: 14px; width: min(430px, 92vw); }
  a.app {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 22px; border-radius: 18px; text-decoration: none; color: #fff;
    font-size: 21px; font-weight: 800; letter-spacing: .3px;
    border: 1.5px solid transparent; transition: transform .08s ease, filter .12s ease;
  }
  a.app:active { transform: scale(.985); filter: brightness(1.12); }
  a.app small { display: block; font-size: 12.5px; font-weight: 600; opacity: .85; margin-top: 3px; letter-spacing: .2px; }
  .dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 12px currentColor; }
  .auction   { background: #221a08; border-color: #d9a441; } .auction .dot { background: #d9a441; color: #d9a441; }
  .packing   { background: #0d1f13; border-color: #22b357; } .packing .dot { background: #22b357; color: #22b357; }
  .receiving { background: #0c1626; border-color: #3b82f6; } .receiving .dot { background: #3b82f6; color: #3b82f6; }
  .foot { margin-top: 26px; color: #6f6f74; font-size: 12px; letter-spacing: .4px; }
</style>
</head>
